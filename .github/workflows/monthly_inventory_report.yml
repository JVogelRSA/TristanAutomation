name: Monthly Internal Inventory Report

on:
  schedule:
    # Daily at 15:05 UTC (08:05 PT) on the 1st-7th. The script (--monthly)
    # only sends on the day the first new-month DCL "Items Status" snapshot
    # arrives, so this fires exactly once per month. Runs 5 min after the
    # Zeni job to avoid hammering IMAP at the same instant.
    - cron: '5 15 1-7 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Compute and log only (no email)'
        type: boolean
        default: false
      ignore_monthly_guard:
        description: 'Send now regardless of snapshot-arrival day'
        type: boolean
        default: false

jobs:
  inventory-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Internal Inventory Report
      env:
        IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
        IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
        IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        INTERNAL_RECIPIENTS: ${{ secrets.INTERNAL_RECIPIENTS }}
        DC1_VALUE_USD: ${{ secrets.DC1_VALUE_USD }}
        KIDS_VALUE_USD: ${{ secrets.KIDS_VALUE_USD }}
        DC1_COST_USD: ${{ secrets.DC1_COST_USD }}
        KIDS_COST_USD: ${{ secrets.KIDS_COST_USD }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: |
        FLAGS=""
        if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
        if [ "${{ inputs.ignore_monthly_guard }}" != "true" ]; then FLAGS="$FLAGS --monthly"; fi
        python inventory_internal_report.py $FLAGS
