name: Weekly Unified Report

on:
  schedule:
    # Runs at 10:00 AM UTC every Monday
    - cron: '0 10 * * 1'
  workflow_dispatch:  # Allows manual triggering

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Write Snowflake private key
      env:
        SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      if: env.SNOWFLAKE_PRIVATE_KEY != ''
      run: |
        mkdir -p ~/.ssh/snowflake
        printf '%s\n' "$SNOWFLAKE_PRIVATE_KEY" > ~/.ssh/snowflake/snowflake_key.p8
        chmod 600 ~/.ssh/snowflake/snowflake_key.p8

    - name: Run Unified Weekly Report
      env:
        # Email / SMTP
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        # Inventory (IMAP → DCL CSVs)
        IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
        IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
        IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        EMAIL_SUBJECT_KEYWORD: ${{ secrets.EMAIL_SUBJECT_KEYWORD }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        # LLM
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Spend connectors
        BREX_API_KEY: ${{ secrets.BREX_API_KEY }}
        MERCURY_API_KEY: ${{ secrets.MERCURY_API_KEY }}
        RIPPLING_API_KEY: ${{ secrets.RIPPLING_API_KEY }}
        CASH_BALANCE_USD: ${{ secrets.CASH_BALANCE_USD }}
        # Sales (Snowflake)
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        SNOWFLAKE_PRIVATE_KEY_PATH: /home/runner/.ssh/snowflake/snowflake_key.p8
      run: python weekly_report.py
